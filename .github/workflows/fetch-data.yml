name: Fetch AI Pulse Data

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Grok API
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add client/public/data/
          git diff --staged --quiet || git commit -m "chore: update AI Pulse data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
