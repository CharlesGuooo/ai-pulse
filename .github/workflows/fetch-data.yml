name: Fetch AI Pulse Data

on:
  schedule:
    # Run once daily at 07:00 Beijing time (UTC+8) = 23:00 UTC previous day
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Grok API
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and push data (with retry)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add client/public/data/
          git diff --staged --quiet || git commit -m "chore: update AI Pulse data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          
          # Retry push up to 5 times with exponential backoff to handle GitHub server errors
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, waiting before retry..."
            sleep $((i * 30))
          done
          echo "All push attempts failed"
          exit 1
